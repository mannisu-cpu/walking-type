<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Walking as Reading</title>
    <link rel="stylesheet" href="pause.css">

    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./fonts/ABCDiatypeVariable.ttf') format('opentype');
        }

        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'MyCustomFont', serif;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
        }

        button {
            margin-right: 10px;
            padding: 6px 10px;
            top: 100px;
            bottom: 10px;
            left: 10px;
            right: 10px;
        }

        #text {
            position: fixed;
            top: 100px;
            bottom: 10px;
            left: 10px;
            right: 10px;
            font-size: 20px;
            font-family: 'MyCustomFont', serif;
            line-height: 1.5;
            max-height: 30vh;
            overflow: auto;
            opacity: 0.8;
        }
    </style>
</head>


<body>



    <div id="ui">
        <button onclick="replay()">Replay</button>
        <span id="status">waiting...</span>
    </div>

    <canvas id="c"></canvas>
    <div id="text"></div>

    <script>
        /* ---------------- CANVAS ---------------- */
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        /* ---------------- DATA ---------------- */
        let path = [];
        let words = [];
        let lastPos = null;
        let stopped = false;
        let lastWordPoint = null;
        let minWordSpacing = 100; // 控制词间距（可以调）

        /* ---------------- WORD POOL ---------------- */
        const vocab = [
            "walk", "trace", "press", "knead",
            "memory", "ground", "layer", "drift",
            "imprint", "erase", "surface", "distance",
            "footprint", "step", "tread", "mark",
            "leave", "trace", "follow", "wander",
            "earth", "soil", "pavement", "path",
        ];

        /* ---------------- GPS ---------------- */
        function dist(a, b) {
            const R = 6371000;
            const toRad = d => d * Math.PI / 180;

            const dLat = toRad(b.lat - a.lat);
            const dLon = toRad(b.lon - a.lon);

            const x =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(a.lat)) *
                Math.cos(toRad(b.lat)) *
                Math.sin(dLon / 2) ** 2;

            return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
        }

        /* ---------------- DRAW ---------------- */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;

            ctx.beginPath();

            path.forEach((p, i) => {
                if (!words[i]) return;

                let angle = 0;

                if (i > 0) {
                    const prev = path[i - 1];
                    angle = Math.atan2(p.y - prev.y, p.x - prev.x);
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(angle);

                ctx.fillText(words[i], 0, 0);

                ctx.restore();
            });


            // words on path
            ctx.fillStyle = "white";
            ctx.font = "20pt sans serif";
            ctx.textBaseline = "middle";

            path.forEach((p, i) => {
                if (words[i]) {
                    ctx.fillText(words[i], p.x + 5, p.y + 5);
                }
            });
        }




        /* ---------------- GPS TRACK ---------------- */
        navigator.geolocation.watchPosition(pos => {

            stopped = false;

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            // convert lat/lon → screen pseudo coords
            const x = (lon + 180) * (canvas.width / 360);
            const y = (90 - lat) * (canvas.height / 180);

            const p = { x, y, lat, lon };

            if (lastPos) {
                const d = dist(lastPos, p);

                if (!lastWordPoint) {
                    path.push(p);
                    words.push("go");
                    lastWordPoint = p;
                } else {
                    const dx = p.x - lastWordPoint.x;
                    const dy = p.y - lastWordPoint.y;
                    const distScreen = Math.sqrt(dx * dx + dy * dy);

                    if (distScreen > minWordSpacing) {
                        path.push(p);

                        words.push(
                            vocab[Math.floor(Math.random() * vocab.length)]
                        );

                        lastWordPoint = p;
                    }
                }
            } else {
                path.push(p);
                words.push("go");
            }


            lastPos = p;

            document.getElementById("status").innerText =
                `path: ${path.length} points`;

            draw();

        }, err => {
            document.getElementById("status").innerText = err.message;
        }, {
            enableHighAccuracy: true
        });



        /* ---------------- STOP DETECTION ---------------- */
        let lastMoveTime = Date.now();

        setInterval(() => {
            const now = Date.now();

            // 如果10秒没有更新 → 认为停止
            if (now - lastMoveTime > 10000) {
                stopped = true;
            }
        }, 1000);

        /* ---------------- REPLAY ---------------- */
        function replay() {
            if (path.length < 2) return;

            let sentence = "";
            let total = 0;

            for (let i = 1; i < words.length; i++) {
                sentence += words[i] + " ";
            }

            document.getElementById("text").innerText =
                "REPLAY TEXT:\n\n" + sentence;
        }

        /* ---------------- UPDATE LOOP ---------------- */
        function loop() {
            draw();
            requestAnimationFrame(loop);
        }
        loop();

    </script>

    <script>
        let lastMove = 0;

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === "function") {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === "granted") {
                        startMotion();
                    }
                });
            } else {
                startMotion();
            }
        }

        function startMotion() {
            window.addEventListener("devicemotion", (e) => {

                const acc = e.accelerationIncludingGravity;
                const magnitude =
                    Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);

                // 👉 灵敏度阈值（可以调）
                if (magnitude > 15) {

                    const now = Date.now();

                    // 防止太密集
                    if (now - lastMove > 300) {

                        simulateStep(); // 👈 当作走了一步
                        lastMove = now;
                    }
                }
            });
        }

        // 每一步调用你原来的逻辑
        function simulateStep() {

            const last = path[path.length - 1] || { x: 200, y: 200 };

            const angle = Math.random() * Math.PI * 2;

            const stepSize = 10;

            const newPoint = {
                x: last.x + Math.cos(angle) * stepSize,
                y: last.y + Math.sin(angle) * stepSize
            };

            path.push(newPoint);

            words.push(
                vocab[Math.floor(Math.random() * vocab.length)]
            );
        }
    </script>

    <button onclick="requestPermission()">Start Walking
    </button>


</body>

</html>
