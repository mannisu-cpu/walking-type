<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walking as Reading</title>

    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./fonts/ABCDiatypeVariable.ttf') format('opentype');
        }

        body {
            margin: 0;
            background: black;
            color: white;
            font-family: serif;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 12px;
            border-radius: 20px;
        }

        #ui button {
            padding: 6px 12px;
            font-family: 'MyCustomFont', serif;
            font-size: 14pt;
            margin: 0;
            border: 1px solid #f9f1a5;
            border-radius: 20px;
            background: transparent;
            color: #f9f1a5;
            cursor: pointer;
        }

        /* steps status style: use custom typeface at 12pt */
        #status {
            font-family: 'MyCustomFont', serif;
            font-size: 12pt;
            color: #f9f1a5;
            opacity: 1;

        }

        #text {
            font-family: 'MyCustomFont', serif;
            font-size: 16pt;
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 30vh;
            overflow: auto;
            font-size: 14px;
            line-height: 1.5;
            opacity: 1;
        }


        .eyes {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }

        .eye {
            width: 200px;
            height: 200px;
        }

        /* eyelids */
        .lid {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111;
            pointer-events: none;
        }

        .lid.top {
            top: -100%;
        }

        .lid.bottom {
            bottom: -100%;
        }
    </style>
</head>

<body>

    <div class="eyes">
        <div class="eye" id="eyeL">
            <svg viewBox="0 0 200 200" class="eye-svg">

                <!-- 白眼 -->
                <circle cx="100" cy="100" r="90" fill="white" />

                <!-- iris -->
                <g id="irisL">
                    <circle cx="100" cy="145" r="40" fill="#black" />

                    <!-- pupil -->
                    <circle cx="120" cy="142" r="5" fill="white" />
                </g>

                <!-- eyelid（上） -->
                <rect id="lidTopL" x="0" y="-100" width="200" height="100" fill="#111" />

                <!-- eyelid（下） -->
                <rect id="lidBottomL" x="0" y="200" width="200" height="100" fill="#111" />

            </svg>

        </div>

        <div class="eye" id="eyeR">
            <svg viewBox="0 0 200 200" class="eye-svg">

                <!-- 白眼 -->
                <circle cx="100" cy="100" r="90" fill="white" />

                <!-- iris -->
                <g id="irisR">
                    <circle cx="100" cy="145" r="40" fill="#black" />

                    <!-- pupil -->
                    <circle cx="120" cy="142" r="5" fill="white" />
                </g>

                <!-- eyelid（上） -->
                <rect id="lidTopR" x="0" y="-100" width="200" height="100" fill="#111" />

                <!-- eyelid（下） -->
                <rect id="lidBottomR" x="0" y="200" width="200" height="100" fill="#111" />

            </svg>

        </div>
        <video id="video" autoplay playsinline style="display:none">
        </video>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
        <script src="script.js"></script>

    </div>

    <div id="ui">
        <button onclick="requestPermission()">GO</button>
        <button onclick="replay()">Read My Path</button>
        <button id="gpsBtn" onclick="toggleGPS()">Use GPS</button>
        <button onclick="savePath()">Save My Path</button>
        <span id="status">waiting...</span>
    </div>

    <canvas id="c"></canvas>
    <div id="text"></div>

    <script>
        /* ---------------- CANVAS ---------------- */
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        /* ---------------- DATA ---------------- */
        let lines = [[]];   // 每一行是一组点
        let wordLines = [[]];
        let path = [];      // 当前行的点
        let words = [];     // 当前行的单词

        let lastPoint = { x: canvas.width / 2, y: canvas.height / 2 };
        let lastWordPoint = null;

        /* ---------------- CONFIG ---------------- */
        const stepSize = 12;
        const wordSpacing = 25;

        /* ---------------- WORDS ---------------- */
        const vocab = [
            "walk", "trace", "press", "knead",
            "memory", "ground", "layer", "drift",
            "imprint", "erase", "surface", "distance",
            "footprint", "step", "mark", "leave",
            "tread", "trace", "drift", "imprint",
            "we", "the", "thinking", "generates", " rhythm", "of",
            "is", "and", "on", "in", "under", "over", "between", "through",
            "with", "by", "from", "to", "towards", "beyond", "across", "along",
            "earth", "sidewalk", "street", "path", "trail", "destination", "layer",
        ];

        /* ---------------- DRAW ---------------- */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;

            ctx.fillStyle = "white";
            ctx.font = "16px serif";
            ctx.textBaseline = "middle";

            lines.forEach((line, li) => {

                ctx.beginPath();

                line.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });

                ctx.stroke();

                line.forEach((p, i) => {

                    const word = wordLines[li][i];
                    if (!word) return;

                    let angle = 0;

                    if (i > 0) {
                        const prev = line[i - 1];
                        angle = Math.atan2(p.y - prev.y, p.x - prev.x);
                    }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(angle);
                    ctx.fillText(word, 0, 0);
                    ctx.restore();
                });

            });
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 0;
        ctx.shadowColor = "transparent";

        ctx.beginPath();
        path.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.font = "30px MyCustomFont";
        ctx.textBaseline = "middle";
        ctx.shadowBlur = 0;
        ctx.shadowColor = "transparent";

        path.forEach((p, i) => {
            if (!words[i]) return;

            let angle = 0;
            if (i > 0) {
                const prev = path[i - 1];
                angle = Math.atan2(p.y - prev.y, p.x - prev.x);
            }

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(angle);
            ctx.fillText(words[i], 0, 0);
            ctx.restore();
        });


        /* ---------------- STEP GENERATION ---------------- */
        let currentLine = 0;
        let lineLength = 0;

        function addStep(intensity) {

            const angle = Math.random() * Math.PI * 2;

            const newPoint = {
                x: lastPoint.x + Math.cos(angle) * stepSize,
                y: lastPoint.y + Math.sin(angle) * stepSize
            };

            newPoint.x = Math.max(0, Math.min(canvas.width, newPoint.x));
            newPoint.y = Math.max(0, Math.min(canvas.height, newPoint.y));

            // 👉 当前行
            let currentPath = lines[currentLine];
            let currentWords = wordLines[currentLine];

            // 👉 计算方向变化（用于断行）
            let turnAngle = 0;
            if (currentPath.length > 1) {
                const a = currentPath[currentPath.length - 2];
                const b = currentPath[currentPath.length - 1];

                const angle1 = Math.atan2(b.y - a.y, b.x - a.x);
                const angle2 = Math.atan2(newPoint.y - b.y, newPoint.x - b.x);

                turnAngle = Math.abs(angle2 - angle1);
            }

            // 👉 累计长度
            lineLength += stepSize;

            // 🔥 自动换行条件
            if (lineLength > 300 || turnAngle > 1.0) {

                currentLine++;
                lines[currentLine] = [];
                wordLines[currentLine] = [];

                lineLength = 0;
                lastWordPoint = null;
            }

            // 👉 单词间距控制
            if (!lastWordPoint) {
                lines[currentLine].push(newPoint);
                wordLines[currentLine].push("start");
                lastWordPoint = newPoint;
            } else {
                const dx = newPoint.x - lastWordPoint.x;
                const dy = newPoint.y - lastWordPoint.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > wordSpacing) {
                    lines[currentLine].push(newPoint);

                    wordLines[currentLine].push(
                        vocab[Math.floor(Math.random() * vocab.length)]
                    );

                    lastWordPoint = newPoint;
                }
            }

            lastPoint = newPoint;

            document.getElementById("status").innerText =
                `lines: ${lines.length}`;
        }

        // 根据晃动强度决定方向变化
        const angle = Math.random() * Math.PI * 2;

        const newPoint = {
            x: lastPoint.x + Math.cos(angle) * stepSize,
            y: lastPoint.y + Math.sin(angle) * stepSize
        };

        // 边界限制
        newPoint.x = Math.max(0, Math.min(canvas.width, newPoint.x));
        newPoint.y = Math.max(0, Math.min(canvas.height, newPoint.y));

        // 控制单词间距
        if (!lastWordPoint) {
            path.push(newPoint);
            words.push("start");
            lastWordPoint = newPoint;
        } else {
            const dx = newPoint.x - lastWordPoint.x;
            const dy = newPoint.y - lastWordPoint.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > wordSpacing) {
                path.push(newPoint);

                words.push(
                    vocab[Math.floor(Math.random() * vocab.length)]
                );

                lastWordPoint = newPoint;
            }


            lastPoint = newPoint;

            document.getElementById("status").innerText =
                `steps: ${path.length}`;
        }

        /* ---------------- MOTION ---------------- */
        let lastMove = 0;

        function startMotion() {
            window.addEventListener("devicemotion", e => {

                const acc = e.accelerationIncludingGravity;

                const magnitude =
                    Math.abs(acc.x) +
                    Math.abs(acc.y) +
                    Math.abs(acc.z);

                // 灵敏度阈值（可调）
                if (magnitude > 15) {

                    const now = Date.now();

                    if (now - lastMove > 250) {
                        addStep(magnitude);
                        lastMove = now;
                    }
                }

            });
        }

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === "function") {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === "granted") {
                        startMotion();
                    }
                });
            } else {
                startMotion();
            }
        }

        /* ---------------- REPLAY ---------------- */
        function replay() {

            let output = "";
            let text = words.join(" ");

            wordLines.forEach(line => {
                output += line.join(" ") + "\n\n";
            });

            document.getElementById("text").innerText =
                "REPLAY TEXT:\n\n" + text;

            if (words.length < 2) return;



            document.getElementById("text").innerText =
                "REPLAY TEXT:\n\n" + text;
        }

        // Export current canvas as a JPEG and trigger download
        function savePath() {
            // create an export canvas to ensure a solid black background for JPEG
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const ectx = exportCanvas.getContext('2d');

            // fill background black
            ectx.fillStyle = 'black';
            ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // draw current canvas on top
            ectx.drawImage(canvas, 0, 0);

            // get JPEG data and download
            const data = exportCanvas.toDataURL('image/jpeg', 0.92);
            const a = document.createElement('a');
            a.href = data;
            a.download = `walking-path-${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        }
        /* ---------------- GPS TRACKING ---------------- */
        var gpsWatchId = null;
        let originLat = null;
        let originLon = null;
        const gpsScale = 2; // pixels per meter (adjust for zoom)

        function latLonDeltaMeters(lat1, lon1, lat2, lon2) {
            // approximate local east/north meter offsets from (lat1,lon1) to (lat2,lon2)
            const R = 6378137; // earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const meanLat = (lat1 + lat2) / 2 * Math.PI / 180;
            const dy = dLat * R; // north
            const dx = dLon * R * Math.cos(meanLat); // east
            return { x: dx, y: dy };
        }

        function startGPS() {
            if (!navigator.geolocation) {
                alert('Geolocation not supported by this browser.');
                return;
            }
            // reset origin and path so GPS path is clear
            originLat = null;
            originLon = null;
            path = [];
            words = [];

            gpsWatchId = navigator.geolocation.watchPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    if (originLat === null) {
                        originLat = lat;
                        originLon = lon;
                    }

                    const meters = latLonDeltaMeters(originLat, originLon, lat, lon);
                    // convert meters to canvas px, center at canvas center
                    const px = canvas.width / 2 + meters.x * gpsScale;
                    const py = canvas.height / 2 - meters.y * gpsScale; // y downwards

                    const newPoint = { x: px, y: py };
                    path.push(newPoint);

                    document.getElementById('status').innerText =
                        `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}  points:${path.length}`;
                },
                err => {
                    console.warn('geolocation error', err);
                    document.getElementById('status').innerText = 'GPS error: ' + (err.message || err.code);
                },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
            );

            document.getElementById('gpsBtn').innerText = 'Stop GPS';
        }

        function stopGPS() {
            if (gpsWatchId !== null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }
            document.getElementById('gpsBtn').innerText = 'Use GPS';
        }

        function toggleGPS() {
            if (gpsWatchId) stopGPS();
            else startGPS();
        }

        /* ---------------- LOOP ---------------- */
        function loop() {
            draw();
            requestAnimationFrame(loop);
        }

        // Wait for the custom font to load before starting the render loop
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                loop();
            }).catch(() => loop());
        } else {
            loop();
        }
    </script>

</body>

</html>
