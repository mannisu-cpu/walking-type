<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walking as Reading</title>

    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./fonts/ABCDiatypeVariable.ttf') format('opentype');
        }

        body {
            margin: 0;
            background: black;
            color: white;
            font-family: serif;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 12px;
            border-radius: 20px;
            transition: transform 0.22s ease, opacity 0.22s ease;
        }

        #ui button {
            padding: 6px 12px;
            font-family: 'MyCustomFont', serif;
            font-size: 14pt;
            margin: 0;
            border: 1px solid #f9f1a5;
            border-radius: 20px;
            background: transparent;
            color: #f9f1a5;
            cursor: pointer;
        }

        /* steps status style: use custom typeface at 12pt */
        #status {
            font-family: 'MyCustomFont', serif;
            font-size: 12pt;
            color: #f9f1a5;
            opacity: 1;

        }

        #text {
            font-family: 'MyCustomFont', serif;
            font-size: 16pt;
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 30vh;
            overflow: auto;
            font-size: 14px;
            line-height: 1.5;
            opacity: 1;
        }

        /* toggle button for hiding/showing the UI controls */
        #uiToggle {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 11;
            padding: 6px 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.35);
            color: #f9f1a5;
            border: 1px solid #f9f1a5;
            font-family: 'MyCustomFont', serif;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #ui.hidden {
            transform: translateX(-50%) translateY(-120%);
            opacity: 0;
            pointer-events: none;
        }


        .eyes {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }

        .eye {
            width: 200px;
            height: 200px;
        }

        /* eyelids */
        .lid {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111;
            pointer-events: none;
        }

        .lid.top {
            top: -100%;
        }

        .lid.bottom {
            bottom: -100%;
        }
    </style>
</head>

<body>

    <div class="eyes">
        <div class="eye" id="eyeL">
            <svg viewBox="0 0 200 200" class="eye-svg">

                <!-- 白眼 -->
                <circle cx="100" cy="100" r="90" fill="white" />

                <!-- iris -->
                <g id="irisL">
                    <circle cx="100" cy="145" r="40" fill="#black" />

                    <!-- pupil -->
                    <circle cx="120" cy="142" r="5" fill="white" />
                </g>

                <!-- eyelid（上） -->
                <rect id="lidTopL" x="0" y="-100" width="200" height="100" fill="#111" />

                <!-- eyelid（下） -->
                <rect id="lidBottomL" x="0" y="200" width="200" height="100" fill="#111" />

            </svg>

        </div>

        <div class="eye" id="eyeR">
            <svg viewBox="0 0 200 200" class="eye-svg">

                <!-- 白眼 -->
                <circle cx="100" cy="100" r="90" fill="white" />

                <!-- iris -->
                <g id="irisR">
                    <circle cx="100" cy="145" r="40" fill="#black" />

                    <!-- pupil -->
                    <circle cx="120" cy="142" r="5" fill="white" />
                </g>

                <!-- eyelid（上） -->
                <rect id="lidTopR" x="0" y="-100" width="200" height="100" fill="#111" />

                <!-- eyelid（下） -->
                <rect id="lidBottomR" x="0" y="200" width="200" height="100" fill="#111" />

            </svg>

        </div>
        <video id="video" autoplay playsinline style="display:none">
        </video>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
        <script src="script.js"></script>

    </div>

    <button id="uiToggle" aria-expanded="true" title="Toggle controls">☰</button>

    <div id="ui">
        <button onclick="requestPermission()">GO</button>
        <button onclick="replay()">Read My Path</button>
        <button id="gpsBtn" onclick="toggleGPS()">Use GPS</button>
        <button onclick="savePath()">Save My Path</button>
        <span id="status">waiting...</span>
    </div>

    <canvas id="c"></canvas>
    <div id="text"></div>

    <script>
        /* ---------------- CANVAS ---------------- */
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Pan/drag workspace state (allows moving the canvas content with touch/mouse)
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let panStart = { x: 0, y: 0 };

        // Pointer events for dragging (works for touch and mouse)
        canvas.addEventListener('pointerdown', (e) => {
            isPanning = true;
            panStart.x = e.clientX;
            panStart.y = e.clientY;
            canvas.setPointerCapture(e.pointerId);
            e.preventDefault();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isPanning) return;
            const dx = e.clientX - panStart.x;
            const dy = e.clientY - panStart.y;
            panX += dx;
            panY += dy;
            panStart.x = e.clientX;
            panStart.y = e.clientY;
            e.preventDefault();
        });

        function endPan(e) {
            isPanning = false;
            try { canvas.releasePointerCapture && canvas.releasePointerCapture(e.pointerId); } catch (err) { }
        }

        canvas.addEventListener('pointerup', endPan);
        canvas.addEventListener('pointercancel', endPan);
        canvas.addEventListener('pointerleave', endPan);

        /* ---------------- DATA ---------------- */
        let path = [];
        let words = [];

        let lastPoint = { x: canvas.width / 2, y: canvas.height / 2 };

        /* ---------------- CONFIG ---------------- */
        const stepSize = 12;
        const wordSpacing = 25;

        /* ---------------- WORDS ---------------- */
        const vocab = [
            "walk", "trace", "press", "knead",
            "memory", "ground", "layer", "drift",
            "imprint", "erase", "surface", "distance",
            "footprint", "step", "mark", "leave",
            "tread", "trace", "drift", "imprint",
            "we", "the", "thinking", "generates", " rhythm", "of",
            "is", "and", "on", "in", "under", "over", "between", "through",
            "with", "by", "from", "to", "towards", "beyond", "across", "along",
            "earth", "sidewalk", "street", "path", "trail", "destination", "layer",
        ];

        /* ---------------- DRAW ---------------- */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Apply pan translation so the user can drag the workspace
            ctx.save();
            ctx.translate(panX, panY);

            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";

            ctx.beginPath();
            path.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "30px MyCustomFont";
            ctx.textBaseline = "middle";
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";

            // draw words centered on each segment (midpoint of prev->current)
            for (let i = 1; i < path.length; i++) {
                const p = path[i];
                const prev = path[i - 1];
                const w = words[i] || '';
                if (!w) continue;
                const mx = (prev.x + p.x) / 2;
                const my = (prev.y + p.y) / 2;
                const angle = Math.atan2(p.y - prev.y, p.x - prev.x);

                ctx.save();
                ctx.translate(mx, my);
                ctx.rotate(angle);
                ctx.fillText(w, 0, 0);
                ctx.restore();
            }

            ctx.restore();
        }

        /* ---------------- STEP GENERATION ---------------- */
        function addStep(intensity) {
            // Try to place the next step so it doesn't overlap existing "footprints".
            // We'll attempt several random directions, preferring ones that are at least
            // `minSeparation` away from any existing path point. If all attempts fail,
            // we'll accept the best candidate and nudge it outward.

            const minSeparation = Math.max(22, stepSize * 1.6); // px between footprints
            const maxAttempts = 14;

            function dist2(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return dx * dx + dy * dy;
            }

            let bestPoint = null;
            let bestMinDist2 = -1;
            let bestAngle = 0;

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const angle = Math.random() * Math.PI * 2;
                const candidate = {
                    x: lastPoint.x + Math.cos(angle) * stepSize,
                    y: lastPoint.y + Math.sin(angle) * stepSize
                };

                // compute nearest distance squared to existing path points
                let nearest2 = Infinity;
                for (let i = 0; i < path.length; i++) {
                    const d2 = dist2(candidate, path[i]);
                    if (d2 < nearest2) nearest2 = d2;
                    // quick reject if already overlapping badly
                    if (nearest2 < (minSeparation * minSeparation) / 4) break;
                }

                if (nearest2 > bestMinDist2) {
                    bestMinDist2 = nearest2;
                    bestPoint = candidate;
                    bestAngle = angle;
                }

                // if candidate is sufficiently far from others accept it
                if (nearest2 >= minSeparation * minSeparation) {
                    bestPoint = candidate;
                    break;
                }
            }

            let newPoint = bestPoint || {
                x: lastPoint.x + stepSize,
                y: lastPoint.y
            };

            // extend the segment a bit so each yellow segment is visually longer
            const extraLen = Math.max(8, Math.round(stepSize * 0.9));
            const segAngle = bestAngle || Math.atan2(newPoint.y - lastPoint.y, newPoint.x - lastPoint.x);
            newPoint.x += Math.cos(segAngle) * extraLen;
            newPoint.y += Math.sin(segAngle) * extraLen;

            // if still too close, push it outward along vector from nearest point
            if (path.length > 0) {
                // find nearest existing point
                let nearestIdx = -1;
                let nearest2 = Infinity;
                for (let i = 0; i < path.length; i++) {
                    const d2 = dist2(newPoint, path[i]);
                    if (d2 < nearest2) {
                        nearest2 = d2;
                        nearestIdx = i;
                    }
                }

                const minSep2 = minSeparation * minSeparation;
                if (nearest2 < minSep2 && nearestIdx >= 0) {
                    const near = path[nearestIdx];
                    const dx = newPoint.x - near.x || 0.0001;
                    const dy = newPoint.y - near.y || 0.0001;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    const need = (minSeparation - d);
                    // nudge along the normalized vector away from the nearest point
                    newPoint.x += (dx / d) * need;
                    newPoint.y += (dy / d) * need;
                }
            }

            // Add the step to the path and bind a single word to this segment.
            // For the very first point we add a placeholder so segment words align
            // with indices (words[1] corresponds to segment 0->1).
            const dxw = newPoint.x - lastPoint.x;
            const dyw = newPoint.y - lastPoint.y;
            const segDist = Math.sqrt(dxw * dxw + dyw * dyw) || 1;
            let w = null;
            for (let t = 0; t < 8; t++) {
                const candidate = vocab[Math.floor(Math.random() * vocab.length)];
                if (segDist < wordSpacing * 1.4) {
                    if (candidate.length <= 6) { w = candidate; break; }
                } else { w = candidate; break; }
            }
            if (!w) w = vocab[Math.floor(Math.random() * vocab.length)];

            if (path.length === 0) {
                path.push(newPoint);
                words.push('');
            } else {
                path.push(newPoint);
                words.push(w);
            }

            lastPoint = newPoint;

            document.getElementById("status").innerText = `steps: ${path.length}`;
        }

        /* ---------------- MOTION ---------------- */
        let lastMove = 0;

        function startMotion() {
            window.addEventListener("devicemotion", e => {

                const acc = e.accelerationIncludingGravity;

                const magnitude =
                    Math.abs(acc.x) +
                    Math.abs(acc.y) +
                    Math.abs(acc.z);

                // 灵敏度阈值（可调）
                if (magnitude > 15) {

                    const now = Date.now();

                    if (now - lastMove > 250) {
                        addStep(magnitude);
                        lastMove = now;
                    }
                }

            });
        }

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === "function") {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === "granted") {
                        startMotion();
                    }
                });
            } else {
                startMotion();
            }
        }

        /* ---------------- REPLAY ---------------- */
        function replay() {
            if (words.length < 2) return;
            // skip the first placeholder word
            let text = words.slice(1).join(" ");
            document.getElementById("text").innerText =
                "REPLAY TEXT:\n\n" + text;
        }

        // Export current canvas as a JPEG and trigger download
        function savePath() {
            // create an export canvas to ensure a solid black background for JPEG
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const ectx = exportCanvas.getContext('2d');

            // fill background black
            ectx.fillStyle = 'black';
            ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // draw current canvas on top
            ectx.drawImage(canvas, 0, 0);

            // get JPEG data and download
            const data = exportCanvas.toDataURL('image/jpeg', 0.92);
            const a = document.createElement('a');
            a.href = data;
            a.download = `walking-path-${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        }
        /* ---------------- GPS TRACKING ---------------- */
        let gpsWatchId = null;
        let originLat = null;
        let originLon = null;
        const gpsScale = 2; // pixels per meter (adjust for zoom)

        function latLonDeltaMeters(lat1, lon1, lat2, lon2) {
            // approximate local east/north meter offsets from (lat1,lon1) to (lat2,lon2)
            const R = 6378137; // earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const meanLat = (lat1 + lat2) / 2 * Math.PI / 180;
            const dy = dLat * R; // north
            const dx = dLon * R * Math.cos(meanLat); // east
            return { x: dx, y: dy };
        }

        function startGPS() {
            if (!navigator.geolocation) {
                alert('Geolocation not supported by this browser.');
                return;
            }
            // reset origin and path so GPS path is clear
            originLat = null;
            originLon = null;
            path = [];
            words = [];

            gpsWatchId = navigator.geolocation.watchPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    if (originLat === null) {
                        originLat = lat;
                        originLon = lon;
                    }

                    const meters = latLonDeltaMeters(originLat, originLon, lat, lon);
                    // convert meters to canvas px, center at canvas center
                    const px = canvas.width / 2 + meters.x * gpsScale;
                    const py = canvas.height / 2 - meters.y * gpsScale; // y downwards

                    const newPoint = { x: px, y: py };
                    path.push(newPoint);

                    document.getElementById('status').innerText =
                        `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}  points:${path.length}`;
                },
                err => {
                    console.warn('geolocation error', err);
                    document.getElementById('status').innerText = 'GPS error: ' + (err.message || err.code);
                },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
            );

            document.getElementById('gpsBtn').innerText = 'Stop GPS';
        }

        function stopGPS() {
            if (gpsWatchId !== null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }
            document.getElementById('gpsBtn').innerText = 'Use GPS';
        }

        function toggleGPS() {
            if (gpsWatchId) stopGPS();
            else startGPS();
        }

        /* ---------------- LOOP ---------------- */
        function loop() {
            draw();
            requestAnimationFrame(loop);
        }

        // Wait for the custom font to load before starting the render loop
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                loop();
            }).catch(() => loop());
        } else {
            loop();
        }

        // UI toggle: hide/show the control bar so it doesn't obstruct the canvas
        (function () {
            const ui = document.getElementById('ui');
            const btn = document.getElementById('uiToggle');
            if (!ui || !btn) return;

            btn.addEventListener('click', (e) => {
                const hidden = ui.classList.toggle('hidden');
                btn.innerText = hidden ? '☰' : '✕';
                btn.setAttribute('aria-expanded', (!hidden).toString());
            });

            // start with UI visible on large screens, collapsed on small screens
            if (window.innerWidth < 600) {
                ui.classList.add('hidden');
                btn.innerText = '☰';
                btn.setAttribute('aria-expanded', 'false');
            }
        })();
    </script>

</body>

</html>
