<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./fonts/ABCDiatypeVariable.ttf') format('opentype');
        }

        body {
            margin: 0;
            background: black;
            color: white;
            font-family: serif;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 12px;
            border-radius: 6px;
        }

        #ui button {
            padding: 6px 12px;
            font-family: 'MyCustomFont', serif;
            font-size: 20pt;
            margin: 0;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
        }

        /* steps status style: use custom typeface at 12pt */
        #status {
            font-family: 'MyCustomFont', serif;
            font-size: 12pt;
            color: white;
        }

        #text {
            font-family: 'MyCustomFont', serif;
            font-size: 16pt;
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 30vh;
            overflow: auto;
            font-size: 14px;
            line-height: 1.5;
            opacity: 1;
        }
    </style>
</head>

<body>

    <div id="ui">
        <button onclick="requestPermission()">GO</button>
        <button onclick="replay()">Read My Path</button>
        <button onclick="savePath()">Save JPG</button>
        <span id="status">waiting...</span>
    </div>

    <canvas id="c"></canvas>
    <div id="text"></div>

    <script>
        /* ---------------- CANVAS ---------------- */
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        /* ---------------- DATA ---------------- */
        let path = [];
        let words = [];

        let lastPoint = { x: canvas.width / 2, y: canvas.height / 2 };
        let lastWordPoint = null;

        /* ---------------- CONFIG ---------------- */
        const stepSize = 12;
        const wordSpacing = 25;

        /* ---------------- WORDS ---------------- */
        const vocab = [
            "walk", "trace", "press", "knead",
            "memory", "ground", "layer", "drift",
            "imprint", "erase", "surface", "distance",
            "footprint", "step", "mark", "leave",
            "tread", "trace", "drift", "imprint",
            "we", "the", "thinking", "generates", " rhythm", "of"
        ];

        /* ---------------- DRAW ---------------- */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";

            ctx.beginPath();
            path.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "30px MyCustomFont";
            ctx.textBaseline = "middle";
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";

            path.forEach((p, i) => {
                if (!words[i]) return;

                let angle = 0;
                if (i > 0) {
                    const prev = path[i - 1];
                    angle = Math.atan2(p.y - prev.y, p.x - prev.x);
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(angle);
                ctx.fillText(words[i], 0, 0);
                ctx.restore();
            });
        }

        /* ---------------- STEP GENERATION ---------------- */
        function addStep(intensity) {

            // 根据晃动强度决定方向变化
            const angle = Math.random() * Math.PI * 2;

            const newPoint = {
                x: lastPoint.x + Math.cos(angle) * stepSize,
                y: lastPoint.y + Math.sin(angle) * stepSize
            };

            // 边界限制
            newPoint.x = Math.max(0, Math.min(canvas.width, newPoint.x));
            newPoint.y = Math.max(0, Math.min(canvas.height, newPoint.y));

            // 控制单词间距
            if (!lastWordPoint) {
                path.push(newPoint);
                words.push("start");
                lastWordPoint = newPoint;
            } else {
                const dx = newPoint.x - lastWordPoint.x;
                const dy = newPoint.y - lastWordPoint.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > wordSpacing) {
                    path.push(newPoint);

                    words.push(
                        vocab[Math.floor(Math.random() * vocab.length)]
                    );

                    lastWordPoint = newPoint;
                }
            }

            lastPoint = newPoint;

            document.getElementById("status").innerText =
                `steps: ${path.length}`;
        }

        /* ---------------- MOTION ---------------- */
        let lastMove = 0;

        function startMotion() {
            window.addEventListener("devicemotion", e => {

                const acc = e.accelerationIncludingGravity;

                const magnitude =
                    Math.abs(acc.x) +
                    Math.abs(acc.y) +
                    Math.abs(acc.z);

                // 灵敏度阈值（可调）
                if (magnitude > 15) {

                    const now = Date.now();

                    if (now - lastMove > 250) {
                        addStep(magnitude);
                        lastMove = now;
                    }
                }

            });
        }

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === "function") {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === "granted") {
                        startMotion();
                    }
                });
            } else {
                startMotion();
            }
        }

        /* ---------------- REPLAY ---------------- */
        function replay() {
            if (words.length < 2) return;

            let text = words.join(" ");

            document.getElementById("text").innerText =
                "REPLAY TEXT:\n\n" + text;
        }

        // Export current canvas as a JPEG and trigger download
        function savePath() {
            // create an export canvas to ensure a solid black background for JPEG
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const ectx = exportCanvas.getContext('2d');

            // fill background black
            ectx.fillStyle = 'black';
            ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // draw current canvas on top
            ectx.drawImage(canvas, 0, 0);

            // get JPEG data and download
            const data = exportCanvas.toDataURL('image/jpeg', 0.92);
            const a = document.createElement('a');
            a.href = data;
            a.download = `walking-path-${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        /* ---------------- LOOP ---------------- */
        function loop() {
            draw();
            requestAnimationFrame(loop);
        }

        // Wait for the custom font to load before starting the render loop
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                loop();
            }).catch(() => loop());
        } else {
            loop();
        }
    </script>

</body>

</html>
