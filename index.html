<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Walking as Reading</title>
    <link rel="stylesheet" href="index.css">
    <style>
        /* full-viewport background canvas */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            display: block;
            pointer-events: none;
            color: #f9f1a5;
        }

        .controls {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 24px;
        }

        .btn {
            display: inline-block;
            margin: 8px;
            padding: 12px 18px;
            background: #111;
            color: #f9f1a5;
            border-radius: 20px;
            text-decoration: none;
            border: 5px solid #fefff3
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>

    <div class="controls">
        <a class="btn" href="move/move.html">Pause, for easy reading</a>
        <a class="btn" href="pause/walking2.html">Reading, on the move</a>
    </div>

    <script>
        // Background looping pen-like path animation
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // generate a random smooth path across the canvas
        function generatePath(segmentCount = 120) {
            const pts = [];
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            pts.push({ x, y });
            for (let i = 1; i < segmentCount; i++) {
                const angle = (Math.random() - 0.5) * Math.PI * 0.6;
                const dist = 20 + Math.random() * 40;
                x += Math.cos(angle) * dist + (Math.random() - 0.5) * 30;
                y += Math.sin(angle) * dist + (Math.random() - 0.5) * 30;
                // wrap around edges
                if (x < 0) x += canvas.width;
                if (x > canvas.width) x -= canvas.width;
                if (y < 0) y += canvas.height;
                if (y > canvas.height) y -= canvas.height;
                pts.push({ x, y });
            }
            return pts;
        }

        // draw a pen-like stroke for given subpath (deterministic, crisper)
        function drawPenStroke(path, progressIndex, pathIndex) {
            // draw multiple deterministic passes to simulate pen texture
            for (let pass = 0; pass < 3; pass++) {
                ctx.beginPath();
                const jitter = (pass - 1) * 0.7; // small offset per pass
                for (let i = 0; i <= progressIndex; i++) {
                    const p = path[i];
                    // deterministic subtle variation along the stroke
                    const noise = Math.sin(i * 0.17 + pass * 2.3 + pathIndex) * 0.5;
                    const nx = p.x + noise * jitter;
                    const ny = p.y + Math.cos(i * 0.11 + pass) * jitter * 0.4;
                    if (i === 0) ctx.moveTo(nx, ny);
                    else ctx.lineTo(nx, ny);
                }
                ctx.lineWidth = 1.0 + pass * 0.6;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.strokeStyle = 'rgba(10,10,10,' + (0.28 + pass * 0.16) + ')';
                ctx.globalCompositeOperation = 'source-over';
                ctx.stroke();
            }
            // add a crisp single stroke on top
            ctx.beginPath();
            for (let i = 0; i <= progressIndex; i++) {
                const p = path[i];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.lineWidth = 1.0;
            ctx.strokeStyle = '#111';
            ctx.stroke();

            // draw words at intervals to replace some of the strokes (less frequent)
            if (progressIndex > 12 && textPool && textPool.length) {
                const wordStep = Math.max(10, Math.floor(progressIndex / 12));
                ctx.fillStyle = '#111';
                ctx.font = '20px serif';
                ctx.fontFamily = 'MyCustomFont, serif';
                ctx.textBaseline = 'middle';
                const timeIndex = Math.floor(frame / textUpdateRate);
                for (let i = 0; i <= progressIndex; i += wordStep) {
                    const p = path[i];
                    const next = path[Math.min(i + 1, path.length - 1)];
                    if (!p || !next) continue;
                    const w = textPool[(i + pathIndex + timeIndex) % textPool.length];
                    const angle = Math.atan2(next.y - p.y, next.x - p.x);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(angle);
                    ctx.fillText(w, 0, 0);
                    ctx.restore();
                }
            }
        }

        // create a set of paths and animate them in a loop
        const paths = [];
        const pathCount = 3;
        for (let i = 0; i < pathCount; i++) paths.push(generatePath(150));

        let frame = 0;
        const framesPerPath = 480; // frames to draw one full path (doubled to slow motion by half)

        // text pool (split into words) to replace some strokes
        const textPool = "Walking, ideally, is a state in which the mind, the body, and the world are aligned, as though they were three characters finally in conversation together, three notes suddenly making a chord. Walking allows us to be in our bodies and in the world without being made busy by them. It leaves us free to think without being wholly lost in our thoughts.".split(/\s+/).map(s => s.replace(/[.,]/g, ''));
        // controls text update speed: larger => slower
        const textUpdateRate = 5;

        // Sketching state and animation control
        let isAnimating = true;
        let frame = 0;
        const framesPerPath = 480; // frames to draw one full path (doubled to slow motion by half)
        const textUpdateRate = 10;

        const sketchPaths = []; // completed user sketches
        let currentSketch = null;

        // draw any user sketches (always drawn on top)
        function drawSketches() {
            if (!sketchPaths.length && !currentSketch) return;
            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            // sketches use crisper single-pass stroke
            const all = sketchPaths.concat(currentSketch ? [currentSketch] : []);
            all.forEach((sk, pi) => {
                if (!sk || sk.length < 2) return;
                ctx.beginPath();
                for (let i = 0; i < sk.length; i++) {
                    const p = sk[i];
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.lineWidth = 2.0;
                ctx.strokeStyle = '#111';
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();

                // draw words along the sketch
                const step = Math.max(10, Math.floor(sk.length / 12));
                ctx.fillStyle = '#111';
                ctx.font = '14px serif';
                ctx.textBaseline = 'middle';
                const timeIndex = Math.floor(frame / textUpdateRate);
                for (let i = 0; i < sk.length; i += step) {
                    const p = sk[i];
                    const next = sk[Math.min(i + 1, sk.length - 1)];
                    if (!p || !next) continue;
                    const w = textPool[(i + pi + timeIndex) % textPool.length];
                    const angle = Math.atan2(next.y - p.y, next.x - p.x);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(angle);
                    ctx.fillText(w, 0, 0);
                    ctx.restore();
                }
            });
            ctx.restore();
        }

        // main render loop: always running, but background animation only when enabled
        function renderLoop() {
            // clear + background
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f7f6ef';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isAnimating) {
                // draw each animated path
                for (let k = 0; k < paths.length; k++) {
                    const path = paths[k];
                    const t = ((frame + k * Math.floor(framesPerPath / paths.length)) % framesPerPath) / framesPerPath;
                    const idx = Math.floor(t * (path.length - 1));
                    ctx.save();
                    ctx.globalAlpha = 0.85 - k * 0.18;
                    drawPenStroke(path, idx, k);
                    ctx.restore();
                }
                frame = (frame + 1) % framesPerPath;
            }

            // draw user sketches on top (whether animating or not)
            drawSketches();

            requestAnimationFrame(renderLoop);
        }

        // regenerate animated paths occasionally
        setInterval(() => {
            for (let i = 0; i < paths.length; i++) paths[i] = generatePath(150);
        }, 24000);

        renderLoop();

        // ----- Pointer / Touch sketch support -----
        let isPointerDown = false;

        function toCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX !== undefined ? e.clientX : e.touches && e.touches[0].clientX);
            const y = (e.clientY !== undefined ? e.clientY : e.touches && e.touches[0].clientY);
            return { x: x - rect.left, y: y - rect.top };
        }

        function stopAnimationAndClear() {
            isAnimating = false;
            // clear animated paths and background (keeps sketches)
            for (let i = 0; i < paths.length; i++) paths[i] = [];
            frame = 0;
        }

        function onPointerDown(e) {
            e.preventDefault();
            const pos = toCanvasPos(e);
            // single click toggles animation off and clears animation
            if (isAnimating) {
                stopAnimationAndClear();
            }
            isPointerDown = true;
            currentSketch = [{ x: pos.x, y: pos.y }];
            if (e.pointerId) canvas.setPointerCapture(e.pointerId);
        }

        function onPointerMove(e) {
            if (!isPointerDown || !currentSketch) return;
            e.preventDefault();
            const pos = toCanvasPos(e);
            const last = currentSketch[currentSketch.length - 1];
            const dx = pos.x - last.x;
            const dy = pos.y - last.y;
            if (Math.hypot(dx, dy) > 2) {
                currentSketch.push({ x: pos.x, y: pos.y });
            }
        }

        function onPointerUp(e) {
            if (!isPointerDown) return;
            isPointerDown = false;
            if (e.pointerId) canvas.releasePointerCapture(e.pointerId);
            if (currentSketch && currentSketch.length > 1) sketchPaths.push(currentSketch);
            currentSketch = null;
        }

        // attach pointer events (covers mouse + touch on supporting browsers)
        canvas.addEventListener('pointerdown', onPointerDown);
        canvas.addEventListener('pointermove', onPointerMove);
        canvas.addEventListener('pointerup', onPointerUp);
        canvas.addEventListener('pointercancel', onPointerUp);

        // fallback touch events for older browsers
        canvas.addEventListener('touchstart', (e) => onPointerDown(e.touches[0]));
        canvas.addEventListener('touchmove', (e) => onPointerMove(e.touches[0]));
        canvas.addEventListener('touchend', (e) => onPointerUp(e.changedTouches[0]));
    </script>

</body>

</html>

</html>
