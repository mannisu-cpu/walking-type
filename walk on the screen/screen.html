<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trace with Words</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./fonts/ABCDiatypeVariable.ttf') format('opentype');
        }

        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            font-family: 'MyCustomFont', serif;
            background: #fcfae9;
            color: #111;
        }

        /* full-screen drawing canvas */
        #drawCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            touch-action: none;
            /* prevent default scrolling while drawing */
            -ms-touch-action: none;
        }

        .controls {
            position: fixed;
            right: 12px;
            top: 12px;
            z-index: 1100
        }

        .btn {
            background: #111;
            color: #f9f1a5;
            top: 50px;
            padding: 8px 12px;
            border-radius: 14px;
            border: none;
            text-decoration: none
        }

        /* Use foot cursor from images folder (path relative to this file) */
        body, #drawCanvas {
            cursor: url('../images/foot.svg') 16 16, auto;
        }

        h3 {
            position: fixed;
            left: 12px;
            top: 50px;
            z-index: 1100;
            font-family: 'MyCustomFont', sans-serif, ;
            font-size: 12pt;
            color: #111;
            margin: 0;
        }
    </style>
</head>

<body>
    <canvas id="drawCanvas"></canvas>
    <img id="bgImage" alt="background"
        style="position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:998;pointer-events:none;display:none">
    <div class="controls">
        <button id="clearBtn" class="btn">Clear</button>
        <button id="saveJpgBtn" class="btn">Save Path</button>
        <button id="uploadBgBtn" class="btn">Upload Photos</button>
        <button id="toggleBarBtn" class="btn">Hide Bar</button>
    </div>

    <div>
        <h3> Use your finger or mouse as foot, trace the path on the screen.

        </h3>
    </div>

    <!-- Control bar: color pickers and sliders to tune generated text path -->
    <div id="controlBar"
        style="position:fixed;left:12px;bottom:12px;right:12px;z-index:1100;background:rgba(255,255,255,0.94);border-radius:8px;padding:8px;box-shadow:0 6px 18px rgba(0,0,0,0.12);font-family:'MyCustomFont', system-ui, Arial;">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <label>Color A: <input id="colorA" type="color" value="#111111"></label>
            <label>Color B: <input id="colorB" type="color" value="#f9f1a5"></label>
            <label style="display:flex;align-items:center">Mix: <input id="mix" type="range" min="0" max="100"
                    value="50" style="margin-left:8px"></label>
            <label style="display:flex;align-items:center">Font size: <input id="fontSize" type="range" min="10"
                    max="48" value="18" style="margin-left:8px"></label>
            <label style="display:flex;align-items:center">Rotation: <input id="rot" type="range" min="-90" max="90"
                    value="0" style="margin-left:8px"></label>
            <label style="display:flex;align-items:center">Char spacing: <input id="charSpacing" type="range" min="-10"
                    max="40" value="0" style="margin-left:8px"></label>
            <label style="display:flex;align-items:center">Compression: <input id="compress" type="range" min="50"
                    max="150" value="100" style="margin-left:8px"></label>
            <label style="display:flex;align-items:center">Monochrome photo: <input id="monoBg" type="checkbox"
                    style="margin-left:8px"></label>
            <label style="display:flex;align-items:center">Mono color: <select id="monoColor" style="margin-left:8px">
                    <option value="A">Color A</option>
                    <option value="B">Color B</option>
                </select></label>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');

        // configuration (some parameters are adjustable via control bar)
        let stepPx = 36; // distance between placed words
        let fontSize = 18;
        const fontFamily = 'MyCustomFont, system-ui, Arial';

        // UI-controlled parameters
        let colorA = '#111111';
        let colorB = '#f9f1a5';
        let mix = 0.5; // 0..1
        let rotationOffset = 0; // degrees
        let charSpacing = 0; // px between chars
        let compression = 1; // horizontal scale (1 = normal)

        // text pool
        const textPool = "Walking, ideally, is a state in which the mind, the body, and the world are aligned, as though they were three characters finally in conversation together, three notes suddenly making a chord. Walking allows us to be in our bodies and in the world without being made busy by them. It leaves us free to think without being wholly lost in our thoughts.".split(/\s+/).map(s => s.replace(/[.,]/g, ''));

        // drawing state
        let isDrawing = false;
        let lastPoint = null;
        let carry = 0; // leftover distance toward next word placement
        let wordIndex = 0;

        function resizeCanvas() {
            const ratio = window.devicePixelRatio || 1;
            canvas.width = Math.floor(window.innerWidth * ratio);
            canvas.height = Math.floor(window.innerHeight * ratio);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.textBaseline = 'middle';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getEventPos(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length) {
                clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length) {
                clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX; clientY = e.clientY;
            }
            return { x: clientX, y: clientY };
        }

        function dist(a, b) {
            const dx = a.x - b.x; const dy = a.y - b.y; return Math.sqrt(dx * dx + dy * dy);
        }

        function hexToRgb(hex) {
            const h = hex.replace('#', '');
            return { r: parseInt(h.substring(0, 2), 16), g: parseInt(h.substring(2, 4), 16), b: parseInt(h.substring(4, 6), 16) };
        }

        function rgbToHex(r, g, b) {
            const toHex = (v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function mixColor(a, b, t) {
            const A = hexToRgb(a); const B = hexToRgb(b);
            return rgbToHex(A.r * (1 - t) + B.r * t, A.g * (1 - t) + B.g * t, A.b * (1 - t) + B.b * t);
        }

        function placeWordAt(p, angle) {
            const word = textPool[wordIndex % textPool.length];
            const colorMix = mix * ((wordIndex % 10) / 9);
            const fill = mixColor(colorA, colorB, colorMix);
            wordIndex++;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(angle + (rotationOffset * Math.PI / 180));

            // apply horizontal compression
            ctx.scale(compression, 1);
            ctx.fillStyle = fill;
            ctx.font = `${fontSize}px ${fontFamily}`;

            // draw characters individually with extra spacing
            let x = 0;
            for (let i = 0; i < word.length; i++) {
                const ch = word[i];
                const w = ctx.measureText(ch).width;
                ctx.fillText(ch, x, 0);
                x += w + charSpacing;
            }
            ctx.restore();
        }

        function appendPoint(p) {
            if (!lastPoint) { lastPoint = p; return; }
            let segStart = lastPoint;
            let remaining = dist(segStart, p);
            if (remaining <= 0) { lastPoint = p; return; }

            // unit vector
            const dx = (p.x - segStart.x) / remaining;
            const dy = (p.y - segStart.y) / remaining;

            let traveled = carry;
            while (traveled + stepPx <= remaining + 1e-6) {
                traveled += stepPx;
                const nx = segStart.x + dx * traveled;
                const ny = segStart.y + dy * traveled;
                const point = { x: nx, y: ny };
                const angle = Math.atan2(dy, dx);
                placeWordAt(point, angle);
            }
            carry = Math.max(0, (traveled + 0) - remaining);
            lastPoint = p;
        }

        function startDraw(p) {
            isDrawing = true; lastPoint = p; carry = 0;
        }

        function endDraw() {
            isDrawing = false; lastPoint = null; carry = 0;
        }

        // event handlers
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(getEventPos(e)); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (!isDrawing) startDraw(getEventPos(e)); appendPoint(getEventPos(e)); }, { passive: false });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); endDraw(); }, { passive: false });

        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); startDraw(getEventPos(e)); });
        window.addEventListener('mousemove', (e) => { if (!isDrawing) return; appendPoint(getEventPos(e)); });
        window.addEventListener('mouseup', (e) => { if (!isDrawing) return; endDraw(); });

        // clear button
        document.getElementById('clearBtn').addEventListener('click', () => {
            // clear canvas content
            const ratio = window.devicePixelRatio || 1;
            ctx.clearRect(0, 0, canvas.width / ratio, canvas.height / ratio);
            wordIndex = 0; carry = 0; lastPoint = null;
        });

        // save as JPG
        document.getElementById('saveJpgBtn').addEventListener('click', () => {
            const ratio = window.devicePixelRatio || 1;
            const w = Math.floor(canvas.width / ratio);
            const h = Math.floor(canvas.height / ratio);
            const out = document.createElement('canvas');
            out.width = w; out.height = h;
            const octx = out.getContext('2d');
            // fill background (match page background)
            octx.fillStyle = window.getComputedStyle(document.body).backgroundColor || '#ffffff';
            octx.fillRect(0, 0, w, h);
            // draw the drawing canvas into output canvas
            octx.drawImage(canvas, 0, 0, w, h);
            const data = out.toDataURL('image/jpeg', 0.95);
            const a = document.createElement('a');
            a.href = data;
            a.download = 'trace.jpg';
            document.body.appendChild(a);
            a.click();
            a.remove();
        });

        // upload background image (placed under the canvas)
        const bgImgEl = document.getElementById('bgImage');
        const uploadBtn = document.getElementById('uploadBgBtn');
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        uploadBtn.addEventListener('click', () => fileInput.click());
        let originalBgImage = null; // store original uploaded Image object

        function processAndSetBg(img) {
            const mono = document.getElementById('monoBg');
            const monoSel = document.getElementById('monoColor');
            if (!mono || !mono.checked) {
                // show original
                bgImgEl.src = img.src; bgImgEl.style.display = 'block';
                return;
            }
            // choose color A or B
            const colorChoice = monoSel ? monoSel.value : 'A';
            const tintHex = (colorChoice === 'A') ? colorA : colorB;
            // draw to offscreen canvas and tint
            const off = document.createElement('canvas');
            off.width = img.naturalWidth || img.width;
            off.height = img.naturalHeight || img.height;
            const octx = off.getContext('2d');
            octx.drawImage(img, 0, 0, off.width, off.height);
            try {
                const id = octx.getImageData(0, 0, off.width, off.height);
                const d = id.data;
                const tint = hexToRgb(tintHex);
                for (let i = 0; i < d.length; i += 4) {
                    const r = d[i], g = d[i + 1], b = d[i + 2];
                    const L = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                    // map white -> color by luminance
                    d[i] = Math.round(255 * (1 - L) + tint.r * L);
                    d[i + 1] = Math.round(255 * (1 - L) + tint.g * L);
                    d[i + 2] = Math.round(255 * (1 - L) + tint.b * L);
                }
                octx.putImageData(id, 0, 0);
                bgImgEl.src = off.toDataURL('image/jpeg', 0.95);
                bgImgEl.style.display = 'block';
            } catch (err) {
                // security error (CORS) or other; fallback to using original
                console.warn('Could not process image for monochrome:', err);
                bgImgEl.src = img.src; bgImgEl.style.display = 'block';
            }
        }

        fileInput.addEventListener('change', (ev) => {
            const f = ev.target.files && ev.target.files[0];
            if (!f) return;
            const url = URL.createObjectURL(f);
            const img = new Image();
            img.onload = () => {
                originalBgImage = img;
                processAndSetBg(img);
                try { URL.revokeObjectURL(url); } catch (e) { }
            };
            img.src = url;
        });

        // reprocess when mono controls change
        document.addEventListener('input', (e) => {
            if (!originalBgImage) return;
            if (e.target && (e.target.id === 'monoBg' || e.target.id === 'monoColor' || e.target.id === 'colorA' || e.target.id === 'colorB')) {
                processAndSetBg(originalBgImage);
            }
        });

        // ensure background image stays visible on resize (img uses object-fit:cover)
        window.addEventListener('resize', () => { /* no-op: CSS handles cover scaling */ });

        // optional: draw a faint guide stroke as user moves (uncomment if desired)
        // (kept minimal for text-first aesthetic)

        // wire UI controls
        function setupControls() {
            const cA = document.getElementById('colorA');
            const cB = document.getElementById('colorB');
            const mixEl = document.getElementById('mix');
            const fs = document.getElementById('fontSize');
            const rot = document.getElementById('rot');
            const cs = document.getElementById('charSpacing');
            const comp = document.getElementById('compress');

            // initialize
            colorA = cA.value; colorB = cB.value; mix = mixEl.value / 100;
            fontSize = parseInt(fs.value, 10); rotationOffset = parseInt(rot.value, 10); charSpacing = parseInt(cs.value, 10); compression = parseInt(comp.value, 10) / 100;

            fs.addEventListener('input', () => { fontSize = parseInt(fs.value, 10); resizeCanvas(); });
            rot.addEventListener('input', () => { rotationOffset = parseInt(rot.value, 10); });
            cs.addEventListener('input', () => { charSpacing = parseInt(cs.value, 10); });
            comp.addEventListener('input', () => { compression = parseInt(comp.value, 10) / 100; });
            cA.addEventListener('input', () => { colorA = cA.value; });
            cB.addEventListener('input', () => { colorB = cB.value; });
            mixEl.addEventListener('input', () => { mix = mixEl.value / 100; });
        }

        setupControls();

        // create a rasterized cursor from images/foot.svg sized to `size` px
        function setCustomCursor(size = 32) {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = size; c.height = size;
                const cx = c.getContext('2d');
                cx.clearRect(0,0,size,size);
                // draw svg into canvas scaled to fit
                try {
                    cx.drawImage(img, 0, 0, size, size);
                    const data = c.toDataURL('image/png');
                    const hotspot = Math.floor(size/2);
                    const cursor = `url(${data}) ${hotspot} ${hotspot}, auto`;
                    document.body.style.cursor = cursor;
                    canvas.style.cursor = cursor;
                } catch (err) {
                    console.warn('Could not rasterize cursor:', err);
                }
            };
            img.onerror = (e) => console.warn('Failed to load cursor image', e);
            img.src = '../images/foot.svg';
        }

        // try to set cursor at a standard size; call again if user wants different size
        setCustomCursor(32);
        // Transform the `h3` text into a trailing cursor tail composed of its characters.
        (function setupCursorTail(){
            const h3 = document.querySelector('h3');
            if (!h3) return;
            const raw = (h3.textContent || '').trim();
            if (!raw) return;
            // hide original heading
            h3.style.visibility = 'hidden';

            const tailText = raw.split('');
            let tailIndex = 0;
            let lastTime = 0;
            const minInterval = 40; // ms between characters

            function spawnCharAt(x,y){
                const ch = tailText[tailIndex++ % tailText.length];
                const span = document.createElement('span');
                span.textContent = ch;
                span.style.position = 'fixed';
                span.style.left = x + 'px';
                span.style.top = y + 'px';
                span.style.transform = 'translate(-50%,-50%)';
                span.style.pointerEvents = 'none';
                span.style.fontFamily = "MyCustomFont, system-ui, Arial";
                span.style.fontSize = Math.max(12, Math.round(fontSize * 0.9)) + 'px';
                span.style.color = mixColor(colorA, colorB, mix * ((tailIndex % 10)/9));
                span.style.opacity = '1';
                span.style.transition = 'transform 850ms cubic-bezier(.22,1,.36,1), opacity 850ms linear';
                document.body.appendChild(span);
                // on next frame, push it upward and fade
                requestAnimationFrame(()=>{
                    span.style.transform = 'translate(-50%,-150%)';
                    span.style.opacity = '0';
                });
                // cleanup
                setTimeout(()=>{ try{ span.remove(); }catch(e){} }, 900);
            }

            function onPointerMove(e){
                const now = performance.now();
                if (now - lastTime < minInterval) return;
                lastTime = now;
                const x = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
                const y = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
                spawnCharAt(x,y);
            }

            // pointer events cover mouse and touch; keep passive:false to allow preventDefault elsewhere
            window.addEventListener('pointermove', onPointerMove);
        })();
        // keyboard shortcut: press 'a' to toggle (hide/show) the control bar by changing visibility
        function toggleControlBar() {
            const bar = document.getElementById('controlBar');
            if (!bar) return;
            // if currently hidden via display:none, show it; otherwise hide
            const isHidden = window.getComputedStyle(bar).display === 'none';
            if (isHidden) {
                bar.style.display = '';
            } else {
                bar.style.display = 'none';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') {
                const tag = (e.target && e.target.tagName) || '';
                if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;
                toggleControlBar();
            }
        });

        // mobile UI toggle button: fold/hide parameters bar
        const toggleBarBtn = document.getElementById('toggleBarBtn');
        if (toggleBarBtn) {
            function updateToggleLabel() {
                const bar = document.getElementById('controlBar');
                if (!bar) return;
                const hidden = window.getComputedStyle(bar).display === 'none';
                toggleBarBtn.textContent = hidden ? 'Show Params' : 'Hide Params';
            }
            toggleBarBtn.addEventListener('click', () => {
                toggleControlBar();
                updateToggleLabel();
            });
            // reflect initial state
            updateToggleLabel();
        }
        // make control bar vertically draggable on mobile: drag down to hide
        (function makeControlBarDraggable() {
            const bar = document.getElementById('controlBar');
            const handle = document.getElementById('controlHandle');
            if (!bar || !handle) return;
            let dragging = false;
            let startY = 0;
            let startTranslate = 0;
            let maxHide = 0; // px allowed to hide

            function refreshMaxHide() {
                maxHide = Math.max(0, bar.offsetHeight - 36); // leave a small peek when hidden
            }
            // initialize
            refreshMaxHide();
            window.addEventListener('resize', refreshMaxHide);

            function setTranslate(v, animated) {
                bar.style.transition = animated ? 'transform 220ms ease' : 'none';
                bar.style.transform = `translateY(${v}px)`;
            }

            handle.addEventListener('pointerdown', (ev) => {
                ev.preventDefault();
                dragging = true;
                startY = ev.clientY;
                const m = window.getComputedStyle(bar).transform;
                if (m && m !== 'none') {
                    const vals = m.match(/matrix\(([^)]+)\)/);
                    if (vals) startTranslate = parseFloat(vals[1].split(',')[5]) || 0;
                    else startTranslate = 0;
                } else startTranslate = 0;
                handle.setPointerCapture(ev.pointerId);
            });

            handle.addEventListener('pointermove', (ev) => {
                if (!dragging) return;
                ev.preventDefault();
                const dy = ev.clientY - startY;
                const next = Math.min(Math.max(0, startTranslate + dy), maxHide + 8);
                setTranslate(next, false);
            });

            function endDrag(ev) {
                if (!dragging) return; dragging = false;
                const m = window.getComputedStyle(bar).transform;
                let current = 0;
                if (m && m !== 'none') {
                    const vals = m.match(/matrix\(([^)]+)\)/);
                    if (vals) current = parseFloat(vals[1].split(',')[5]) || 0;
                }
                // snap: if dragged more than half, hide; else show
                if (current > maxHide * 0.45) setTranslate(maxHide, true);
                else setTranslate(0, true);
                try { if (ev && ev.pointerId) handle.releasePointerCapture(ev.pointerId); } catch (e) { }
            }

            handle.addEventListener('pointerup', endDrag);
            handle.addEventListener('pointercancel', endDrag);
            window.addEventListener('pointerup', endDrag);
        })();
    </script>
</body>

</html>
